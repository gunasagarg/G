<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confession Page</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f8f9fa; text-align: center; padding: 50px; }
        h1 { color: #ff4757; }
        button { padding: 15px 30px; font-size: 18px; color: white; background-color: #007bff; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #response { margin-top: 20px; font-size: 24px; color: #2ed573; }
    </style>
</head>
<body>
    <h1>A Romantic Confession</h1>
    <p>Do you love me?</p>
    <button id="yesButton">YES</button>
    <div id="response"></div>

    <script>
        document.getElementById('yesButton').onclick = function() {
            document.getElementById('response').innerHTML = 'I love you too! 💕\n\nDear, every moment spent with you is like a beautiful dream come true. You hold a special place in my heart, one that cannot be replaced. Your laughter is my melody and your smile, my sunshine. I cherish you beyond words.';
        };
    </script>
</body>
</html>
