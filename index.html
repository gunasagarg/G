<!DOCTYPE html>
<html>
<head>
  <title>System Security Alert</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #0a0e27;
      color: #00ff41;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .terminal-header {
      background: #1a1f3a;
      border-bottom: 2px solid #00ff41;
      padding: 10px 15px;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .window-controls {
      display: flex;
      gap: 8px;
    }

    .control-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      cursor: pointer;
      background: #555;
      border: none;
    }

    .control-btn.close:hover { background: #ff5f56; }
    .control-btn.minimize:hover { background: #ffbd2e; }
    .control-btn.maximize:hover { background: #27c93f; }

    #screen {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      line-height: 1.6;
      font-size: 13px;
    }

    .log-line {
      margin-bottom: 5px;
      opacity: 0;
      animation: fadeIn 0.3s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .success { color: #00ff41; }
    .error { color: #ff4444; }
    .warning { color: #ffaa00; }
    .info { color: #00aaff; }
    .critical { 
      color: #ff0000; 
      font-weight: bold;
      text-shadow: 0 0 10px #ff0000;
    }

    .glitch {
      animation: glitch 0.15s infinite;
    }

    @keyframes glitch {
      0% { transform: translate(2px, -2px); }
      25% { transform: translate(-2px, 2px); }
      50% { transform: translate(2px, 2px); }
      75% { transform: translate(-2px, -2px); }
      100% { transform: translate(0, 0); }
    }

    .ip-display {
      background: #1a1f3a;
      border: 1px solid #00ff41;
      padding: 8px;
      margin: 10px 0;
      font-size: 12px;
      word-break: break-all;
    }

    .progress-bar {
      width: 100%;
      height: 20px;
      background: #1a1f3a;
      border: 1px solid #00ff41;
      margin: 10px 0;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00ff41, #00aa00);
      width: 0%;
      box-shadow: 0 0 10px #00ff41;
    }

    .button-group {
      margin: 20px 0;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 20px;
      background: #1a1f3a;
      color: #00ff41;
      border: 2px solid #00ff41;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      transition: all 0.3s;
    }

    button:hover {
      background: #00ff41;
      color: #0a0e27;
      box-shadow: 0 0 20px #00ff41;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .blink {
      animation: blink 0.7s infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    .file-list {
      background: #1a1f3a;
      border: 1px solid #00ff41;
      padding: 10px;
      margin: 10px 0;
      font-size: 12px;
    }

    .divider {
      border-top: 1px solid #00ff41;
      margin: 15px 0;
    }

    .hacker-text {
      font-weight: bold;
      color: #ff4444;
      text-shadow: 0 0 5px #ff4444;
    }
  </style>
</head>
<body>

<div class="terminal-header">
  <span>root@security-system ~ $</span>
  <div class="window-controls">
    <button class="control-btn minimize"></button>
    <button class="control-btn maximize"></button>
    <button class="control-btn close"></button>
  </div>
</div>

<div id="screen"></div>

<audio id="beep" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>
const screen = document.getElementById("screen");
const beep = document.getElementById("beep");
let lineDelay = 0;

function addLog(text, type = 'info', delay = 100) {
  lineDelay += delay;
  setTimeout(() => {
    const line = document.createElement('div');
    line.className = `log-line ${type}`;
    line.innerHTML = text;
    screen.appendChild(line);
    screen.scrollTop = screen.scrollHeight;
  }, lineDelay);
}

function addDivider() {
  lineDelay += 100;
  setTimeout(() => {
    const div = document.createElement('div');
    div.className = 'divider';
    screen.appendChild(div);
  }, lineDelay);
}

function getRandomIP() {
  return `${Math.floor(Math.random() * 256)}.${Math.floor(Math.random() * 256)}.${Math.floor(Math.random() * 256)}.${Math.floor(Math.random() * 256)}`;
}

function startPrank() {
  // Initial system check
  addLog('[*] Initializing Security Analysis Protocol...', 'info', 0);
  addLog('[*] System: Linux Kernel 5.15.0-84-generic', 'success', 150);
  addLog('[*] Scanning network interfaces...', 'info', 150);
  
  addLog(`[+] eth0: ${getRandomIP()}`, 'success', 150);
  addLog(`[+] wlan0: ${getRandomIP()}`, 'success', 150);
  addLog('[*] Running threat detection...', 'warning', 150);
  addLog('[!] Unusual activity detected!', 'critical', 200);
  
  addDivider();
  
  addLog('[ALERT] Unauthorized access attempt detected from multiple IPs', 'critical', 150);
  
  setTimeout(() => {
    beep.play().catch(() => {});
  }, lineDelay);
  
  addLog('[*] IP Address: ' + getRandomIP(), 'warning', 200);
  addLog('[*] IP Address: ' + getRandomIP(), 'warning', 150);
  addLog('[*] IP Address: ' + getRandomIP(), 'warning', 150);
  
  addDivider();
  
  addLog('[*] Analyzing attack vector...', 'info', 200);
  addLog('[+] Malware signature detected: TROJAN.WIN32.PRANK', 'critical', 150);
  addLog('[+] Origin: Gunasagar G Network', 'error', 150);
  addLog('[!] This is a PRANK attack specifically targeting you!', 'critical', 150);
  
  addDivider();
  
  addLog('[*] Scanning disk...', 'info', 150);
  addLog('[+] /home/user/documents', 'success', 100);
  addLog('[+] /home/user/downloads', 'success', 100);
  addLog('[+] /home/user/desktop', 'success', 100);
  
  addLog('[!] Sensitive files detected', 'warning', 150);
  
  addDivider();
  
  // Progress simulation
  setTimeout(() => {
    screen.innerHTML += `
      <div style="margin: 20px 0;">
        <div>Vulnerability Assessment: <span class="blink">RUNNING</span></div>
        <div class="progress-bar">
          <div class="progress-fill" id="progBar"></div>
        </div>
      </div>
    `;
    
    let progress = 0;
    const progInterval = setInterval(() => {
      progress += Math.random() * 25;
      if (progress > 100) progress = 100;
      document.getElementById('progBar').style.width = progress + '%';
      
      if (progress >= 100) {
        clearInterval(progInterval);
        finalPhase();
      }
    }, 300);
  }, lineDelay + 500);
}

function finalPhase() {
  addDivider();
  addLog('[CRITICAL] System Integrity Compromised!', 'critical', 150);
  addLog('[!] Ransom message received from attacker...', 'error', 150);
  
  addDivider();
  
  setTimeout(() => {
    screen.innerHTML += `
      <div style="text-align: center; margin: 30px 0; padding: 20px; border: 2px solid #ff4444; background: #1a0000;">
        <div class="hacker-text" style="font-size: 18px;">⚠️ RANSOM DEMAND ⚠️</div>
        <br>
        <div style="color: #ff4444; font-size: 16px; margin: 20px 0;">
          ATTENTION USER!
        </div>
        <div style="color: #00ff41; margin: 15px 0;">
          Only one person can save your system...
        </div>
        <div style="color: #ffaa00; font-size: 14px; margin: 20px 0; font-weight: bold;">
          You must answer honestly:
        </div>
        <div style="color: #00aaff; font-size: 18px; margin: 20px 0; font-weight: bold;">
          "Do you think Gunasagar G is awesome?" 😎
        </div>
      </div>
      <div class="button-group" style="justify-content: center;">
        <button onclick="handleYes()">ABSOLUTELY YES ✅</button>
        <button onclick="handleNo()">NOPE 😈</button>
      </div>
    `;
  }, lineDelay + 500);
}

function handleYes() {
  screen.innerHTML = '';
  lineDelay = 0;
  
  addLog('[SUCCESS] Correct answer detected!', 'success', 0);
  addLog('[+] Initializing system recovery...', 'success', 150);
  addLog('[+] Decrypting files: ████████████████████ 100%', 'success', 150);
  addLog('[+] Removing malware signature...', 'success', 150);
  
  addDivider();
  
  addLog('[SYSTEM MESSAGE]', 'info', 150);
  addLog('You have excellent taste! 😎', 'success', 150);
  addLog('Gunasagar G thinks you\'re awesome too! ❤️', 'success', 150);
  addLog('System is safe.', 'warning', 150);
  
  setTimeout(() => {
    screen.innerHTML += `
      <div style="text-align: center; margin: 40px 0; padding: 30px; border: 2px solid #00ff41;">
        <div style="font-size: 24px; color: #00ff41; margin: 20px 0;">😂 YOU GOT PRANKED! 😂</div>
        <div style="color: #00aaff; font-size: 16px; margin: 20px 0;">
          Your friend Gunasagar G sends their regards! 🎉
        </div>
      </div>
    `;
  }, lineDelay + 500);
}

function handleNo() {
  screen.innerHTML = '';
  lineDelay = 0;
  
  addLog('[ERROR] WRONG ANSWER DETECTED!', 'critical', 0);
  
  setTimeout(() => beep.play().catch(() => {}), 500);
  
  addLog('[!] System entering critical state...', 'critical', 200);
  addLog('[!] Encryption protocols engaged', 'error', 150);
  addLog('[!] DO NOT TURN OFF THE DEVICE', 'critical', 150);
  
  addDivider();
  
  const glitchDiv = document.createElement('div');
  glitchDiv.className = 'glitch';
  glitchDiv.style.marginTop = '30px';
  glitchDiv.innerHTML = '<div style="font-size: 20px; color: #ff0000;">CORRUPTING DATA...</div>';
  screen.appendChild(glitchDiv);
  
  setTimeout(() => {
    addLog('[+] Attempting deep scan of your preferences...', 'warning', 200);
    addLog('[+] Analyzing browser history...', 'warning', 150);
    addLog('[+] Cross-referencing with social media...', 'warning', 150);
    addLog('[+] Running AI sentiment analysis...', 'warning', 150);
    
    addDivider();
    
    addLog('[RESULT] Scan complete!', 'success', 200);
    addLog('[+] Hidden preference detected: YOU DO LIKE GUNASAGAR G', 'critical', 150);
    addLog('[!] Lying detected. Not cool! 😂', 'error', 150);
    
    setTimeout(() => {
      screen.innerHTML += `
        <div style="text-align: center; margin: 40px 0; padding: 30px; border: 2px solid #00ff41;">
          <div style="font-size: 24px; color: #ff4444; margin: 20px 0;">😂 CAUGHT RED-HANDED! 😂</div>
          <div style="color: #00aaff; font-size: 16px; margin: 20px 0;">
            Deep scan reveals the truth: You secretly think Gunasagar G is awesome! 😎
          </div>
          <div style="color: #ffaa00; font-size: 14px; margin: 20px 0;">
            Gunasagar G got you with this prank! 🎉
          </div>
        </div>
      `;
    }, lineDelay + 500);
  }, 2000);
}

// Start the prank
startPrank();
</script>

</body>
</html>
