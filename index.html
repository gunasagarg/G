<!DOCTYPE html>

<html>
<head>
  <title>Secure Access</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: #00ff00;
      font-family: monospace;
      overflow: hidden;
      text-align: center;
    }
    #screen {
      padding-top: 100px;
    }
    button {
      padding: 12px 20px;
      margin: 10px;
      font-size: 18px;
      cursor: pointer;
    }
    .glitch {
      animation: glitch 0.1s infinite;
    }
    @keyframes glitch {
      0% { transform: translate(2px, -2px); }
      25% { transform: translate(-2px, 2px); }
      50% { transform: translate(2px, 2px); }
      75% { transform: translate(-2px, -2px); }
      100% { transform: translate(0, 0); }
    }
    #progress {
      width: 60%;
      margin: 20px auto;
      background: #222;
      border: 1px solid #00ff00;
    }
    #bar {
      width: 0%;
      height: 20px;
      background: #00ff00;
    }
  </style>
</head>
<body>

<div id="screen">
  <h2>Initializing scan... 👀</h2>
  <div id="progress"><div id="bar"></div></div>
</div>

<audio id="beep" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>
let width = 0;
let bar = document.getElementById("bar");

let loading = setInterval(() => {
  if (width >= 100) {
    clearInterval(loading);
    showQuestion();
  } else {
    width++;
    bar.style.width = width + "%";
  }
}, 30);

function showQuestion() {
  document.getElementById("screen").innerHTML = `
    <h2>Scan complete ✅</h2>
    <h1>Do you love Guna? 😏</h1>
    <button onclick="yes()">YES ❤️</button>
    <button onclick="no()">NO 😈</button>
  `;
}

function yes() {
  document.body.style.background = "pink";
  document.body.innerHTML = "<h1>I LOVE YOU TOOO ❤️🥺</h1><p>Got you 😏<br>Prank by Guna</p>";
}

function no() {
  let beep = document.getElementById("beep");
  beep.play();

  document.body.classList.add("glitch");
  document.body.innerHTML = "<h1>⚠️ SYSTEM FAILURE ⚠️</h1><p>Emotion mismatch detected...</p>";

  setTimeout(() => {
    document.body.innerHTML += "<h2>Rechecking answer... 😑</h2>";
  }, 1500);

  setTimeout(() => {
    document.body.innerHTML += "<h2>Result: YOU ARE LYING 😂</h2>";
  }, 3000);

  setTimeout(() => {
    document.body.classList.remove("glitch");
    document.body.innerHTML = "<h1>Nice try 😏</h1><p>You still love me 😌<br>Prank by Guna</p>";
  }, 5000);
}
</script>

</body>
</html>
