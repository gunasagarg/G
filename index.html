<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do You Love Me? 💕</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/index.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .heart {
            font-size: 80px;
            margin-bottom: 20px;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
            }
            25% {
                transform: scale(1.3);
            }
            50% {
                transform: scale(1);
            }
        }

        h1 {
            color: #764ba2;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .from {
            color: #999;
            font-size: 14px;
            margin-bottom: 30px;
            font-style: italic;
        }

        .message {
            color: #555;
            font-size: 18px;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 40px;
            font-size: 16px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .yes-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .yes-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.6);
        }

        .yes-btn:active {
            transform: scale(0.98);
        }

        .no-btn {
            background: #ddd;
            color: #555;
            position: relative;
        }

        .no-btn:hover {
            background: #ccc;
            transform: translate(10px, -10px);
        }

        .success-message {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background: #e8f5e9;
            border-radius: 10px;
            color: #2e7d32;
            font-size: 18px;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="heart">❤️</div>
        <h1>Do You Love Me?</h1>
        <div class="from">- gunasagar G 💕</div>
        <p class="message">
            I know this might be cheesy, but I had to ask... 
            <br><br>
            Will you be my valentine? 💑
        </p>
        
        <div class="buttons">
            <button class="yes-btn" onclick="handleYes()">Yes 💕</button>
            <button class="no-btn" onclick="handleNo()">No</button>
        </div>

        <div class="success-message" id="successMessage">
            ✨ I'm the happiest person! You just made my day! ✨
            <br><br>
            gunasagar will know you said YES! 💕
        </div>
    </div>

    <script>
        // Initialize EmailJS (Optional - for notifications)
        // emailjs.init("YOUR_PUBLIC_KEY_HERE");

        function createConfetti() {
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * window.innerWidth + 'px';
                confetti.style.top = '-10px';
                confetti.style.background = ['#667eea', '#764ba2', '#ff69b4', '#ffd700'][Math.floor(Math.random() * 4)];
                confetti.style.animation = `fall ${2 + Math.random() * 1}s linear`;
                document.body.appendChild(confetti);

                setTimeout(() => confetti.remove(), 3000);
            }

            const style = document.createElement('style');
            style.textContent = `
                @keyframes fall {
                    to {
                        transform: translateY(${window.innerHeight + 20}px) rotate(360deg);
                        opacity: 0;
                    }
                }
            `;
            document.head.appendChild(style);
        }

        function handleYes() {
            createConfetti();
            document.querySelector('.buttons').style.display = 'none';
            document.getElementById('successMessage').style.display = 'block';

            // Optional: Send email notification
            // const templateParams = {
            //     to_email: "your-email@gmail.com",
            //     from_name: "Your Girlfriend",
            //     message: "She said YES! 💕",
            //     timestamp: new Date().toLocaleString()
            // };

            // emailjs.send('service_xxxxxx', 'template_xxxxxx', templateParams)
            //     .then(function(response) {
            //         console.log('Email sent!', response);
            //     }, function(error) {
            //         console.log('Failed:', error);
            //     });
        }

        function handleNo() {
            const noBtn = document.querySelector('.no-btn');
            const randomX = Math.random() * 200 - 100;
            const randomY = Math.random() * 200 - 100;
            noBtn.style.transform = `translate(${randomX}px, ${randomY}px)`;
        }
    </script>
</body>
</html>
