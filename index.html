<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Response</title>
    <style>
        body {
            background-color: #fff2f2;
            font-family: 'Arial', sans-serif;
            text-align: center;
            padding: 50px;
        }
        .heart {
            display: inline-block;
            font-size: 100px;
            color: #ff3366;
            animation: pulse 1s infinite;
            transition: transform 0.5s;
        }
        .heart:hover {
            transform: scale(1.1);
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .message {
            font-size: 24px;
            margin-top: 20px;
            color: #ff3366;
            opacity: 0;
            transition: opacity 1s ease-in;
        }
        .show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <h1>Will You Be Mine?</h1>
    <button id="yesButton">ABSOLUTELY YES ✅</button>
    <div id="heartContainer" class="heart" style="display: none;">❤️</div>
    <div id="loveMessage" class="message">You make my heart bloom with love!</div>

    <script>
        document.getElementById('yesButton').onclick = function() {
            document.getElementById('heartContainer').style.display = 'block';
            document.getElementById('loveMessage').classList.add('show');
            setTimeout(() => {
                document.getElementById('heartContainer').style.display = 'none';
            }, 3000);
        };
    </script>
</body>
</html>
